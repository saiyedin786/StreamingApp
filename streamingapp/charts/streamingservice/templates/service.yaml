apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamingservice.fullname" . }}
  labels:
    {{- include "streamingservice.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3002
      protocol: TCP
      name: http
  selector:
    {{- include "streamingservice.selectorLabels" . | nindent 4 }}
