apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatservice.fullname" . }}
  labels:
    {{- include "chatservice.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3004
      protocol: TCP
      name: http
  selector:
    {{- include "chatservice.selectorLabels" . | nindent 4 }}
